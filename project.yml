name: Tilly
options:
  bundleIdPrefix: com.tilly
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  TillyCore:
    path: Packages/TillyCore
  TillyProviders:
    path: Packages/TillyProviders
  TillyStorage:
    path: Packages/TillyStorage
  TillyTools:
    path: Packages/TillyTools
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "10.25.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

targets:
  Tilly:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Tilly
        excludes:
          - "Preview Content"
          - Info.plist
    resources:
      - path: Tilly/Assets.xcassets
      - path: Tilly/Preview Content
      - path: Tilly/GoogleService-Info.plist
    dependencies:
      - package: TillyCore
      - package: TillyProviders
      - package: TillyStorage
      - package: TillyTools
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseDatabase
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    entitlements:
      path: Tilly/Tilly.entitlements
    info:
      path: Tilly/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tilly.app
        PRODUCT_NAME: Tilly
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        DEVELOPMENT_TEAM: YZFVX59ZM2
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        ENABLE_PREVIEWS: YES
        SWIFT_STRICT_CONCURRENCY: complete
        OTHER_LDFLAGS: "-ObjC"

  TillyRemote:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TillyRemote
        excludes:
          - "**/.DS_Store"
          - Info.plist
    resources:
      - path: TillyRemote/Assets.xcassets
      - path: TillyRemote/GoogleService-Info.plist
    dependencies:
      - package: TillyCore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseDatabase
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    entitlements:
      path: TillyRemote/TillyRemote.entitlements
    info:
      path: TillyRemote/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tilly.remote
        PRODUCT_NAME: TillyRemote
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        DEVELOPMENT_TEAM: YZFVX59ZM2
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: complete
        OTHER_LDFLAGS: "-ObjC"
